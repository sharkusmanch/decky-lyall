name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Package plugin zip
        run: |
          mkdir -p out/decky-lyall
          cp -r dist plugin.json package.json main.py py_modules LICENSE README.md out/decky-lyall/
          find out -name '__pycache__' -type d -exec rm -rf {} +
          cd out && zip -r decky-lyall.zip decky-lyall
      - uses: softprops/action-gh-release@v2
        with:
          files: out/decky-lyall.zip
