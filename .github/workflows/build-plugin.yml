name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  test:
    name: Test and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend (pure Python in py_modules/lyall_core)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest -v

      # Frontend
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run build

  build:
    name: Build Decky plugin
    needs: test
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set artifact name from package.json
        id: set-artifact-name
        run: echo "name=$(jq -r '.name' package.json)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - name: Download Decky CLI
        run: |
          mkdir /tmp/decky-cli
          curl -L -o /tmp/decky-cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/download/0.0.7/decky-linux-x86_64"
          chmod +x /tmp/decky-cli/decky
          echo "/tmp/decky-cli" >> "$GITHUB_PATH"

      - name: Build plugin
        run: |
          # Run the CLI as root to get around Docker's permissions
          sudo "$(which decky)" plugin build -b -o /tmp/output -s directory .
          sudo chown -R "$(whoami)" .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: /tmp/output/*.zip
